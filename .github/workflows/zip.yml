name: Build and Pre-Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create zip with correct structure
        run: |
          mkdir -p dist/mmdmigtools
          cp -r . dist/mmdmigtools/
          cd dist
          zip -r ../mmdmigtools.zip mmdmigtools/
          cd ..

      - name: Delete existing pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete pre-release --yes || true
          git push origin :refs/tags/pre-release || true

      - name: Create new pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create pre-release \
            --title "Pre-release (latest)" \
            --notes "Gerado automaticamente a partir do último push na branch \`main\`." \
            --prerelease \
            mmdmigtools.zip
